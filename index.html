<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MTV FOREVER</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    padding-top:60px;
    position:relative;
    z-index:2;
}
.logo{
    font-size:70px;
    font-weight:bold;
}
.logo img{
    filter:drop-shadow(0 0 25px rgba(255,255,255,.15));
}

.slogan{
    letter-spacing:4px;
    margin-bottom:50px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(3,220px);
    gap:20px;
    justify-content:center;
}

.btn{
    padding:20px;
    border-radius:10px;
    font-size:28px;
    font-weight:bold;
    text-decoration:none;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08) translateY(-5px);
    box-shadow:0 0 25px rgba(255,255,255,.4);
}

.mtv80s{
    background:#ff1493;
    color:#66ffff;
}

.mtv90s{
    background:#ffd800;
    color:red;
}

.mtv00s{
    background:#ffb6d9;
    color:black;
}

.hits{
    background:#c9a0ff;
    color:black;
}

.music{
    background:#e8ff3b;
    color:black;
}

.latino{
    background:orange;
    color:black;
}

.shape{
    position:absolute;
    opacity:.25;
    animation:float 12s infinite alternate;
}

.shape1{
    top:10%;
    left:10%;
    color:#ff1493;
    font-size:40px;
}

.shape2{
    top:20%;
    right:15%;
    color:#00ffff;
    font-size:50px;
}

.shape3{
    bottom:20%;
    left:20%;
    color:#ffd800;
    font-size:60px;
}

.shape4{
    bottom:15%;
    right:15%;
    color:orange;
    font-size:45px;
}

@keyframes float{
    0%{
        transform:translateY(0px) rotate(0deg);
    }
    50%{
        transform:translateY(-25px) rotate(8deg);
    }
    100%{
        transform:translateY(25px) rotate(-8deg);
    }
}
</style>
</head>

<body>

<div class="shape shape1">△</div>
<div class="shape shape2">○</div>
<div class="shape shape3">◇</div>
<div class="shape shape4">✦</div>
<div class="shape" style="top:8%;right:5%;color:#ff1493;font-size:70px;">╱</div>

<div class="shape" style="top:15%;left:30%;color:#00ffff;font-size:60px;">╲</div>

<div class="shape" style="bottom:10%;left:5%;color:#ff1493;font-size:80px;">△</div>

<div class="shape" style="bottom:30%;right:8%;color:#00ffff;font-size:55px;">◇</div>

<div class="shape" style="top:40%;left:8%;color:#ffd800;font-size:35px;">○</div>

<div class="shape" style="top:60%;right:25%;color:#ff1493;font-size:45px;">✦</div>

<div class="shape" style="top:5%;left:75%;color:#ffd800;font-size:65px;">╱</div>

<div class="shape" style="bottom:5%;right:35%;color:#00ffff;font-size:70px;">╲</div>

<div class="container">

<div class="logo">
<img src="mtv-music-television-seeklogo.png" alt="MTV Logo" width="280">

<div style="font-size:40px;letter-spacing:8px;margin-top:10px;">
FOREVER
</div>
</div>

<div class="slogan">
THE MUSIC NEVER STOPS
</div>

<div class="buttons">

<a href="#" class="btn mtv80s">MTV 80s</a>

<a href="#" class="btn mtv90s">MTV 90s</a>

<a href="#" class="btn mtv00s">MTV 00s</a>

<a href="#" class="btn hits">MTV HITS</a>

<a href="#" class="btn music">MTV MUSIC</a>

<a href="#" class="btn latino">MTV LATINO</a>

</div>

</div>

</body>
</html>
